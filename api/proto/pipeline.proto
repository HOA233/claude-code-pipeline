syntax = "proto3";

package claudepipeline;

option go_package = "github.com/company/claude-pipeline/api/proto;proto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ClaudePipeline service definition
service ClaudePipeline {
    // Skills
    rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse);
    rpc GetSkill(GetSkillRequest) returns (Skill);
    rpc SyncSkills(SyncSkillsRequest) returns (SyncSkillsResponse);

    // Tasks
    rpc CreateTask(CreateTaskRequest) returns (Task);
    rpc GetTask(GetTaskRequest) returns (Task);
    rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
    rpc GetTaskResult(GetTaskResultRequest) returns (TaskResult);
    rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);
    rpc WatchTask(WatchTaskRequest) returns (stream TaskUpdate);

    // Pipelines
    rpc CreatePipeline(CreatePipelineRequest) returns (Pipeline);
    rpc GetPipeline(GetPipelineRequest) returns (Pipeline);
    rpc ListPipelines(ListPipelinesRequest) returns (ListPipelinesResponse);
    rpc DeletePipeline(DeletePipelineRequest) returns (google.protobuf.Empty);
    rpc RunPipeline(RunPipelineRequest) returns (Run);

    // Runs
    rpc GetRun(GetRunRequest) returns (Run);
    rpc ListRuns(ListRunsRequest) returns (ListRunsResponse);
    rpc CancelRun(CancelRunRequest) returns (CancelRunResponse);
    rpc WatchRun(WatchRunRequest) returns (stream RunUpdate);

    // Schedules
    rpc CreateSchedule(CreateScheduleRequest) returns (Schedule);
    rpc GetSchedule(GetScheduleRequest) returns (Schedule);
    rpc ListSchedules(ListSchedulesRequest) returns (ListSchedulesResponse);
    rpc UpdateSchedule(UpdateScheduleRequest) returns (Schedule);
    rpc DeleteSchedule(DeleteScheduleRequest) returns (google.protobuf.Empty);
    rpc EnableSchedule(EnableScheduleRequest) returns (Schedule);
    rpc DisableSchedule(DisableScheduleRequest) returns (Schedule);
    rpc TriggerSchedule(TriggerScheduleRequest) returns (TriggerScheduleResponse);

    // Status
    rpc GetStatus(google.protobuf.Empty) returns (ServiceStatus);
    rpc GetHealth(google.protobuf.Empty) returns (HealthStatus);
}

// Skill definition
message Skill {
    string id = 1;
    string name = 2;
    string description = 3;
    string version = 4;
    string category = 5;
    repeated SkillParameter parameters = 6;
    map<string, string> tags = 7;
    bool enabled = 8;
}

message SkillParameter {
    string name = 1;
    string type = 2;
    bool required = 3;
    string description = 4;
    string default_value = 5;
    repeated string enum_values = 6;
}

message ListSkillsRequest {}

message ListSkillsResponse {
    repeated Skill skills = 1;
}

message GetSkillRequest {
    string id = 1;
}

message SyncSkillsRequest {}

message SyncSkillsResponse {
    string message = 1;
    int32 count = 2;
}

// Task definition
message Task {
    string id = 1;
    string skill_id = 2;
    string status = 3;
    map<string, string> parameters = 4;
    map<string, string> context = 5;
    bytes result = 6;
    string error = 7;
    int64 duration = 8;
    google.protobuf.Timestamp created_at = 9;
    google.protobuf.Timestamp started_at = 10;
    google.protobuf.Timestamp completed_at = 11;
}

message CreateTaskRequest {
    string skill_id = 1;
    map<string, string> parameters = 2;
    map<string, string> context = 3;
    TaskOptions options = 4;
}

message TaskOptions {
    int32 timeout = 1;
    string callback_url = 2;
}

message GetTaskRequest {
    string id = 1;
}

message ListTasksRequest {
    string status = 1;
    int32 limit = 2;
    int32 offset = 3;
}

message ListTasksResponse {
    repeated Task tasks = 1;
    int32 total = 2;
}

message GetTaskResultRequest {
    string id = 1;
}

message TaskResult {
    string task_id = 1;
    string status = 2;
    bytes result = 3;
    string error = 4;
}

message CancelTaskRequest {
    string id = 1;
}

message CancelTaskResponse {
    bool cancelled = 1;
}

message WatchTaskRequest {
    string id = 1;
}

message TaskUpdate {
    string task_id = 1;
    string type = 2;
    bytes data = 3;
    google.protobuf.Timestamp timestamp = 4;
}

// Pipeline definition
message Pipeline {
    string id = 1;
    string name = 2;
    string description = 3;
    string mode = 4;
    repeated Step steps = 5;
    google.protobuf.Timestamp created_at = 6;
    google.protobuf.Timestamp updated_at = 7;
}

message Step {
    string id = 1;
    string name = 2;
    string cli = 3;
    string action = 4;
    string command = 5;
    map<string, string> params = 6;
    repeated string depends_on = 7;
    string on_error = 8;
    int32 timeout = 9;
}

message CreatePipelineRequest {
    string name = 1;
    string description = 2;
    string mode = 3;
    repeated Step steps = 4;
}

message GetPipelineRequest {
    string id = 1;
}

message ListPipelinesRequest {}

message ListPipelinesResponse {
    repeated Pipeline pipelines = 1;
}

message DeletePipelineRequest {
    string id = 1;
}

message RunPipelineRequest {
    string pipeline_id = 1;
    map<string, string> params = 2;
    map<string, string> context = 3;
}

// Run definition
message Run {
    string id = 1;
    string pipeline_id = 2;
    string status = 3;
    repeated StepResult step_results = 4;
    string error = 5;
    int64 duration = 6;
    google.protobuf.Timestamp created_at = 7;
    google.protobuf.Timestamp started_at = 8;
    google.protobuf.Timestamp completed_at = 9;
}

message StepResult {
    string step_id = 1;
    string status = 2;
    bytes output = 3;
    string error = 4;
    int64 duration = 5;
    int32 retries = 6;
}

message GetRunRequest {
    string id = 1;
}

message ListRunsRequest {
    string pipeline_id = 1;
    string status = 2;
    int32 limit = 3;
}

message ListRunsResponse {
    repeated Run runs = 1;
    int32 total = 2;
}

message CancelRunRequest {
    string id = 1;
}

message CancelRunResponse {
    bool cancelled = 1;
}

message WatchRunRequest {
    string id = 1;
}

message RunUpdate {
    string run_id = 1;
    string type = 2;
    string step_id = 3;
    bytes data = 4;
    google.protobuf.Timestamp timestamp = 5;
}

// Schedule definition
message Schedule {
    string id = 1;
    string name = 2;
    string skill_id = 3;
    map<string, string> parameters = 4;
    string cron_expr = 5;
    bool enabled = 6;
    google.protobuf.Timestamp last_run = 7;
    google.protobuf.Timestamp next_run = 8;
    int32 run_count = 9;
    int32 max_runs = 10;
    google.protobuf.Timestamp created_at = 11;
    google.protobuf.Timestamp updated_at = 12;
}

message CreateScheduleRequest {
    string name = 1;
    string skill_id = 2;
    map<string, string> parameters = 3;
    string cron_expr = 4;
    int32 max_runs = 5;
}

message GetScheduleRequest {
    string id = 1;
}

message ListSchedulesRequest {}

message ListSchedulesResponse {
    repeated Schedule schedules = 1;
}

message UpdateScheduleRequest {
    string id = 1;
    map<string, string> parameters = 2;
    string cron_expr = 3;
    int32 max_runs = 4;
}

message DeleteScheduleRequest {
    string id = 1;
}

message EnableScheduleRequest {
    string id = 1;
}

message DisableScheduleRequest {
    string id = 1;
}

message TriggerScheduleRequest {
    string id = 1;
}

message TriggerScheduleResponse {
    bool triggered = 1;
    Task task = 2;
}

// Status messages
message ServiceStatus {
    string status = 1;
    CLIStatus cli = 2;
    SkillsStatus skills = 3;
}

message CLIStatus {
    int32 active_count = 1;
    int32 max_concurrency = 2;
    repeated string active_tasks = 3;
}

message SkillsStatus {
    int32 loaded = 1;
}

message HealthStatus {
    string status = 1;
    bool ready = 2;
    bool alive = 3;
}