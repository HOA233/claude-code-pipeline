id: performance
name: Performance Optimization
description: Analyzes and optimizes code performance, identifies bottlenecks
version: "1.0.0"
category: quality
tags:
  - performance
  - optimization
  - profiling
  - benchmarking

parameters:
  - name: target
    type: string
    required: true
    description: Target path to analyze (file or directory)

  - name: focus
    type: enum
    values:
      - all
      - memory
      - cpu
      - io
      - network
    default: all
    description: Focus area for optimization

  - name: language
    type: string
    required: false
    description: Primary language of the codebase

  - name: benchmark
    type: boolean
    default: false
    description: Generate benchmark code for identified issues

  - name: suggest_fixes
    type: boolean
    default: true
    description: Include code suggestions for optimizations

cli:
  command: claude
  args:
    - --model
    - claude-sonnet-4-6
    - --max-tokens
    - "16384"
    - --output-format
    - json

timeout: 600

output:
  format: json
  schema:
    issues:
      type: array
      items:
        type: object
        properties:
          type:
            type: string
          severity:
            type: string
          location:
            type: object
          description:
            type: string
          impact:
            type: string
          suggestion:
            type: string
    summary:
      type: object
      properties:
        score:
          type: number
        potential_improvement:
          type: string