apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claude-pipeline.fullname" . }}
  labels:
    {{- include "claude-pipeline.labels" . | nindent 4 }}
type: Opaque
data:
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  gitlab-token: {{ .Values.secrets.gitlabToken | b64enc | quote }}