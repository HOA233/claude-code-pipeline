apiVersion: v1
kind: Namespace
metadata:
  name: claude-pipeline
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-pipeline-config
  namespace: claude-pipeline
data:
  config.yaml: |
    server:
      port: 8080
      read_timeout: 30s
      write_timeout: 30s
    redis:
      addr: redis:6379
      db: 0
    cli:
      max_concurrency: 10
      default_timeout: 600s
    log:
      level: info
---
apiVersion: v1
kind: Secret
metadata:
  name: claude-pipeline-secrets
  namespace: claude-pipeline
type: Opaque
stringData:
  ANTHROPIC_API_KEY: ""
  GITLAB_TOKEN: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-pipeline-api
  namespace: claude-pipeline
  labels:
    app: claude-pipeline
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: claude-pipeline
      component: api
  template:
    metadata:
      labels:
        app: claude-pipeline
        component: api
    spec:
      containers:
        - name: api
          image: claude-pipeline:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-pipeline-secrets
                  key: ANTHROPIC_API_KEY
            - name: GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-pipeline-secrets
                  key: GITLAB_TOKEN
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: claude-pipeline-config
---
apiVersion: v1
kind: Service
metadata:
  name: claude-pipeline-api
  namespace: claude-pipeline
spec:
  selector:
    app: claude-pipeline
    component: api
  ports:
    - port: 80
      targetPort: 8080
      name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: claude-pipeline
  labels:
    app: claude-pipeline
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-pipeline
      component: redis
  template:
    metadata:
      labels:
        app: claude-pipeline
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: claude-pipeline
spec:
  selector:
    app: claude-pipeline
    component: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claude-pipeline-ingress
  namespace: claude-pipeline
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - pipeline.example.com
      secretName: claude-pipeline-tls
  rules:
    - host: pipeline.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claude-pipeline-api
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: claude-pipeline-hpa
  namespace: claude-pipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: claude-pipeline-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80